[workspace]
authors = ["HarvelsX <90945793+HarvelsX@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "survival-resourcepack"
platforms = ["win-64", "linux-64"]
version = "0.1.0"

[tasks]
build = "python build.py"
format = "ruff format ."
lint = "ruff check . --fix"
typecheck = "mypy ."
check = { depends-on = ["format", "lint", "typecheck"] }

[dependencies]
python = ">=3.13.5,<3.14"
jinja2 = ">=3.1.6,<4"
ruff = ">=0.9.1,<0.10"
mypy = ">=1.14.1,<2"
